<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shevlad SIA - Noliktavas LIVE Dashboard</title>
<meta name="color-scheme" content="light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: light;
  --bg:#171d28; --bg2:#1d2433; --panel:#20283a; --bd:#2c374a;
  --gold:#dcbf78; --cyan:#3aecff; --green:#5ee89a; --purple:#bfa8ff; --red:#fa8b8f; --blue:#4cc4ff;
  --tx:#eef1f6; --dim:#b3bccf;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);overflow-x:hidden}
body{color:var(--tx);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.5;padding:10px clamp(14px,3vw,48px) 30px;max-width:1900px;margin:0 auto}
h1,h2{font-family:'Bebas Neue',sans-serif;font-weight:400;letter-spacing:.5px}
.mono{font-family:'Space Mono',monospace}
.top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:5px;border-bottom:1px solid var(--bd);padding-bottom:4px}
.top h1{font-size:15px;color:var(--gold);letter-spacing:.3px}
.top .sub{color:var(--dim);font-size:11px;margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:5px 12px;font-size:14px;color:var(--dim)}
.badge i{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.reload{background:var(--panel);border:1px solid var(--bd);color:var(--tx);border-radius:14px;padding:5px 13px;font-size:14px;cursor:pointer}
.reload:hover{border-color:var(--gold)}
.refreshbtn{background:var(--panel);border:1px solid var(--bd);color:var(--tx);border-radius:14px;padding:6px 15px;font-size:14.5px;cursor:pointer;white-space:nowrap;font-weight:700}
.refreshbtn:hover{border-color:var(--gold)}
.refreshbtn:disabled{opacity:.5;cursor:default}
.topctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;max-width:100%}
.langbar{display:flex;gap:4px;background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:3px;align-items:center}
.langbtn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:none;color:var(--dim);border-radius:11px;padding:5px 13px;font-size:14.5px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.langbtn.active{background:var(--gold);color:#171d28}
.langbtn:not(.active):hover{color:var(--tx)}
.sect{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.8px;color:var(--dim);text-transform:uppercase;margin:16px 0 7px;border-left:3px solid var(--gold);padding-left:9px}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.kpi{background:var(--panel);border:1px solid var(--bd);border-top:2px solid var(--gold);border-radius:6px;padding:5px 9px}
.kpi:nth-child(2){border-top-color:var(--cyan)}
.kpi:nth-child(3){border-top-color:var(--green)}
.kpi:nth-child(4){border-top-color:var(--purple)}
.kpi:nth-child(5){border-top-color:var(--red)}
.kpi:nth-child(6){border-top-color:var(--blue)}
.kpi:nth-child(7){border-top-color:var(--gold)}
.kpi:nth-child(8){border-top-color:var(--cyan)}
.kpi .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.kpi .val{font-family:'Bebas Neue',sans-serif;font-size:16px}
.kpi .sub{font-size:10px;color:var(--dim);margin-top:0}
.kpi .arrow{font-weight:700}
.arrow.up{color:var(--green)}
.arrow.dn{color:var(--red)}
.movebar{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.mcard{flex:1;min-width:100px;background:#141a26;border:1px solid var(--bd);border-radius:6px;padding:9px 13px}
.mcard .mv{font-family:'Bebas Neue',sans-serif;font-size:21px}
.mcard .ml{font-size:13px;color:var(--dim);text-transform:uppercase}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.panel{background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:13px 14px}
.pt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.pt .tt{font-weight:700;font-size:15.5px}
.pt .ds{font-size:13.5px;color:var(--dim)}
.info{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:5px}
.info .box{border-radius:6px;padding:11px 12px;font-size:15px;line-height:1.5}
.box.obs{background:#1c2b3a;border:1px solid #2a4258}
.box.warn{background:#3a2a1c;border:1px solid #58432a}
.box.rec{background:#1c3a26;border:1px solid #2a5838}
.box h3{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.4px;margin-bottom:6px}
.box.obs h3{color:var(--cyan)}
.box.warn h3{color:#f0b24a}
.box.rec h3{color:var(--green)}
.box ul{padding-left:13px}
.box li{margin-bottom:3px}
.brow{display:grid;grid-template-columns:150px 1fr 120px;gap:8px;align-items:center;margin-bottom:6px;font-size:14.5px}
.blabel{color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrack{background:#141a26;border-radius:4px;height:13px;overflow:hidden}
.bfill{height:100%;border-radius:4px}
.bval{font-family:'Space Mono',monospace;text-align:right;white-space:nowrap}
.bpct{color:var(--dim)}
table{width:100%;border-collapse:collapse;font-size:15px}
th{text-align:left;color:var(--dim);font-weight:500;text-transform:uppercase;font-size:13px;letter-spacing:.3px;padding:7px 8px;border-bottom:1px solid var(--bd)}
td{padding:7px 8px;border-bottom:1px solid #232c3d}
tr:hover td{background:#232c3d}
.num{text-align:right}
.bold{font-weight:700;color:var(--gold)}
.dim{color:var(--dim)}
.d-up{color:var(--green);font-weight:700}
.d-dn{color:var(--red);font-weight:700}
.tag{display:inline-block;font-size:13px;padding:2px 8px;border-radius:8px;background:#2c374a;color:var(--dim);margin-left:5px}
.placeholder{color:var(--dim);font-size:15px;padding:14px;text-align:center;border:1px dashed var(--bd);border-radius:6px}
.foot{margin-top:18px;padding-top:8px;border-top:1px solid var(--bd);color:var(--dim);font-size:13.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
.loading{padding:36px;text-align:center;color:var(--dim);font-family:'Space Mono',monospace}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:14px;color:var(--dim)}
.legend .sw{display:inline-block;width:12px;height:2px;vertical-align:middle;margin-right:4px}
.timeline-panel{background:#141a26;border:1px solid var(--bd);border-radius:6px;border-top:2px solid var(--cyan);padding:11px 13px}
.timeline-head{font-family:'Bebas Neue',sans-serif;font-size:13.5px;letter-spacing:.8px;color:var(--cyan);text-transform:uppercase}
.timeline-sub{font-size:13.5px;color:var(--dim);margin-top:2px}
.chart-wrap{max-width:66%;margin:4px auto 0}
.estnote{background:#2a2138;border:1px solid #4a3a68;border-radius:6px;padding:5px 10px;font-size:11px;color:var(--dim);margin-top:4px;line-height:1.35}
.estnote b{color:var(--purple)}
.scrollbars{max-height:340px;overflow-y:auto;padding-right:4px}
.updatebar{display:flex;align-items:center;gap:8px;background:#12321f;border:1px solid #1e5c37;border-radius:6px;padding:8px 13px;margin-bottom:9px;font-size:15px}
.updatebar .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0;animation:pulse 2s infinite}
.updatebar b{color:var(--green)}
.brandbar{display:flex;align-items:center;gap:14px;background:#000;padding:6px 12px;border-radius:8px;margin-bottom:5px;flex-wrap:wrap;border:1px solid #1a1a1a}
.brand-logo{height:24px;width:auto;flex-shrink:0;display:block}
.brandbar-status{font-size:11.5px;color:var(--dim);display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.3}
.brandbar-status .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0;animation:pulse 2s infinite}
.brandbar-status b{color:var(--green);font-weight:700}
.brandbar-status #lastLoadInfo{color:var(--tx);font-weight:700}
.brandbar-status span:not(:empty)::before{content:'·';color:var(--bd);margin:0 1px}
.runslogbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--bd);border-left:3px solid var(--gold);border-radius:6px;padding:7px 12px;margin-bottom:5px;font-size:13px}
.runslogbar .rlb-title{color:var(--dim);text-transform:uppercase;letter-spacing:.3px;font-size:11.5px;font-weight:700;flex-shrink:0}
.runslog-pill{display:inline-flex;align-items:center;gap:5px;background:#141a26;border:1px solid var(--bd);border-radius:14px;padding:3px 10px;font-family:'Space Mono',monospace;font-size:12.5px;white-space:nowrap}
.runslog-pill .t{color:var(--gold);font-weight:700}
.runslog-pill .rev-up{color:var(--green)}
.runslog-pill .rev-flat{color:var(--dim)}
.integrity-badge{display:inline-flex;align-items:center;gap:5px;border-radius:14px;padding:3px 10px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;white-space:nowrap;margin-left:auto}
.integrity-ok{background:rgba(94,232,137,.12);border:1px solid var(--green);color:var(--green)}
.integrity-warn{background:rgba(250,184,143,.14);border:1px solid #fab88f;color:#fab88f}
.integrity-err{background:rgba(250,139,143,.14);border:1px solid var(--red);color:var(--red)}
.integrity-unknown{background:transparent;border:1px solid var(--bd);color:var(--dim)}
.mom-badge{font-size:13.5px;font-weight:700;margin-left:3px;display:inline-block}
.mom-up{color:var(--green)}
.mom-dn{color:var(--red)}
.mom-na{color:var(--dim);font-weight:400}
.chart-tooltip{position:fixed;pointer-events:none;background:#0c0f16;border:1px solid var(--gold);border-radius:7px;padding:10px 13px;font-size:14.5px;line-height:1.55;z-index:999;display:none;max-width:300px;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.ministat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.ministat{background:#141a26;border:1px solid var(--bd);border-left:3px solid var(--gold);border-radius:5px;padding:7px 12px;font-size:14.5px;display:flex;align-items:baseline;gap:6px;flex:1;min-width:150px}
.ministat .v{font-family:'Space Mono',monospace;font-weight:700;font-size:16.5px;color:var(--tx);white-space:nowrap}
.ministat .l{color:var(--dim);font-size:13px;text-transform:uppercase;letter-spacing:.2px}
.ministat .s{color:var(--dim);font-size:13px;margin-left:auto;white-space:nowrap}
.month-label{font-family:'Bebas Neue',sans-serif;font-size:16.5px;color:var(--gold)}
.lsg-more{background:var(--panel);border:1px solid var(--bd);color:var(--tx);border-radius:5px;padding:6px 12px;font-size:14px;cursor:pointer;margin-top:6px}
.lsg-more:hover{border-color:var(--gold)}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:1fr}.info{grid-template-columns:1fr}.chart-wrap{max-width:100%}}
.next-sect-btn{display:none}
@media(max-width:768px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .next-sect-btn{display:flex;position:fixed;right:14px;bottom:18px;width:48px;height:48px;border-radius:50%;background:var(--gold);color:#171d28;align-items:center;justify-content:center;font-size:22px;font-weight:900;box-shadow:0 4px 14px rgba(0,0,0,.45);border:none;cursor:pointer;z-index:500;line-height:1}
  .next-sect-btn:active{transform:scale(.93)}
  .topctrls{width:100%;justify-content:space-between;gap:6px}
  .langbar{padding:2px}
  .langbtn{padding:4px 9px;font-size:12.5px}
  .badge{font-size:11.5px;padding:4px 9px;flex-shrink:1;min-width:0}
  .refreshbtn{font-size:12px;padding:5px 10px;white-space:normal;flex-shrink:0}
  .brandbar{padding:5px 8px;gap:8px}
  .brand-logo{height:20px}
  .brandbar-status{font-size:10.5px}
}
@media(max-width:420px){
  .topctrls{justify-content:center}
  .badge{order:3;width:100%;text-align:center;margin-top:2px}
}
</style>
</head>
<body>

<div class="brandbar">
  <svg class="brand-logo" viewBox="0 0 430 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="8" width="235" height="74" rx="16" fill="#4CAF50"/>
    <rect x="185" y="8" width="115" height="74" rx="16" fill="#10151c"/>
    <text x="18" y="62" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="44" fill="#ffffff">EUROLED</text>
    <text x="200" y="62" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="44" fill="#ffffff">LV</text>
    <text x="325" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="24" fill="#5ee89a">VEIKALS</text>
    <text x="325" y="70" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="24" fill="#eef1f6">NOLIKTAVA</text>
  </svg>
  <div class="brandbar-status">
    <span class="dot"></span> <b id="updateBarText">…</b> <span id="updateBarSub"></span>
    <span id="lastLoadInfo"></span>
    <span id="manualLog"></span>
  </div>
</div>
<div id="runsLogBar" class="runslogbar" style="display:none"></div>
<div id="refreshChanges" style="font-size:14px;color:var(--tx);margin:0 0 6px 2px;display:none;background:var(--panel);border:1px solid var(--bd);border-left:3px solid var(--gold);border-radius:6px;padding:8px 12px"></div>

<div class="top">
  <div>
    <h1 id="pageTitle">SHEVLAD SIA - NOLIKTAVAS LIVE DASHBOARD</h1>
    <div class="sub" id="pageSub"></div>
  </div>
  <div class="topctrls">
    <div class="langbar" id="langBar">
      <button class="langbtn" id="langBtnRu" onclick="switchLang('ru')">🇷🇺 RUS</button>
      <button class="langbtn" id="langBtnLv" onclick="switchLang('lv')">🇱🇻 LAT</button>
    </div>
    <div class="badge" id="statusBadge"><i></i>…</div>
    <button class="refreshbtn" id="refreshBtn" onclick="fullRefresh()">↻</button>
  </div>
</div>

<div id="app"><div class="loading" id="loadingText">…</div></div>
<div class="chart-tooltip" id="chartTooltip"></div>
<button class="next-sect-btn" id="nextSectBtn" onclick="goToNextSection()" title="Nākamā sadaļa / Следующий раздел">↓</button>

<div class="foot">
  <div id="footSource"></div>
  <div id="footTime">Shevlad SIA</div>
</div>

<script>
// ── Live public data source: 2 Google Sheets, shared "Anyone with the link – Viewer".
// No API keys or server-side build step needed — every page load pulls the current sheet content.
const CATALOG_SHEET_ID = '1P1yPiy9tN6sVFQA5s12bKe0lwYT--YKCvchvu-Q2o3g';
const ANALYTICS_SHEET_ID = '1tfbdzGrpWoxPsFGtHtvlhC92551phJrj4RHwjcbRRV8';

// =========================================================================================
// I18N — default RU, switchable to LV. Language only ever affects rendered TEXT; all numeric
// values/aggregations are computed once from the fetched data and are identical in both langs.
// Switching language re-renders from the already-fetched, cached data — no re-fetch happens.
// =========================================================================================
let currentLang = (function(){
  try { return localStorage.getItem('euroledDashLang') || 'ru'; } catch(e){ return 'ru'; }
})();
let lastState = null; // cached {agg, historyRecords, trackerRecords, oosActive, oosResolved}
let lastError = null; // cached error message key, so a failed load also re-translates on language switch
let lastUpdateSource = null; // {type:'manual', used, limit} when the currently shown data came from a manual full-refresh click this session
let manualTimesLog = []; // array of "HH:mm" strings for today's successful manual refreshes (from server)
let lastKnownRunInfo = null; // {lastRunAt, runsToday} - authoritative last successful pipeline write, from status-check or manual refresh
let todayRunsLog = []; // array of {time, unitsSold, revenue, uniqueSkusSold, unitsAdded, newItems, removedItems, isFirstRun} - one entry per individual pipeline run today (09:00/13:00/18:00/manual), from status-check webhook run_log
let feedIntegrity = null; // {hasData, itemsSeen, uniqueKeys, duplicateCount, itemDropPct, status, issues, lastCheckedTime} - proves every unique XML feed item was actually read on the last pipeline run
let lastRefreshChangeData = null; // full response data from the most recent successful manual refresh this session (for re-render on lang switch)
const MANUAL_REFRESH_WEBHOOK = 'https://hook.eu1.make.com/tne3sb7z5uha8elqkkwdpikky7p7swa9';
const MANUAL_REFRESH_TOKEN = 'shvld-mrf-9f2a7c';
const STATUS_CHECK_WEBHOOK = 'https://hook.eu1.make.com/c5smf9v3d3re1ectjueykpfftbt3if32';
let refreshInProgress = false;

const MONTHS = {
  lv: ['Janvāris','Februāris','Marts','Aprīlis','Maijs','Jūnijs','Jūlijs','Augusts','Septembris','Oktobris','Novembris','Decembris'],
  ru: ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь']
};

const T = {
  page_sub: { lv: 'Noliktavas vērtība &amp; krājumu kustība · vērtēts pēc pārdošanas cenas (nav iepirkuma cenu datu — peļņas rādītāji šeit netiek rēķināti)', ru: 'Стоимость склада и движение запасов · оценка по цене продажи (нет данных о закупочных ценах — показатели прибыли здесь не рассчитываются)' },
  loading: { lv: 'Pievelkam dzīvos datus no Google Sheets...', ru: 'Загружаем актуальные данные из Google Sheets...' },
  status_loading: { lv: 'Ielādē...', ru: 'Загрузка...' },
  status_live: { lv: 'Dzīvs · atjaunots {time}', ru: 'Актуально · обновлено {time}' },
  status_error: { lv: 'Kļūda', ru: 'Ошибка' },
  reload: { lv: '↻ Atjaunot', ru: '↻ Обновить' },
  refresh_btn: { lv: '↻ Pilna atjaunošana', ru: '↻ Полное обновление' },
  refresh_running: { lv: 'Atjauno no euroled.lv... (līdz 1 min)', ru: 'Обновление с euroled.lv... (до 1 мин)' },
  refresh_limit: { lv: 'Manuālais limits šodien izmantots ({used}/{limit}). Nākamā automātiskā atjaunošana: 09:00 / 13:00 / 18:00.', ru: 'Дневной лимит ручных обновлений исчерпан ({used}/{limit}). Следующее автообновление: 09:00 / 13:00 / 18:00.' },
  refresh_error: { lv: 'Neizdevās atjaunot: {msg}', ru: 'Не удалось обновить: {msg}' },
  source_manual: { lv: '· atjaunots manuāli ({used}/{limit} šodien)', ru: '· обновлено вручную ({used}/{limit} сегодня)' },
  manual_log_title: { lv: 'Manuāli:', ru: 'Вручную:' },
  manual_log_none: { lv: 'nav izmantots', ru: 'не использовано' },
  manual_log_unauthorized: { lv: 'Nesankcionēts pieprasījums bloķēts (nederīgs tokens) — netika ieskaitīts limitā.', ru: 'Несанкционированный запрос заблокирован (неверный токен) — в лимит не засчитан.' },
  last_load_info: { lv: '🕐 {time} · {runs}x šodien', ru: '🕐 {time} · {runs}x сегодня' },
  last_load_unknown: { lv: 'ielādes laiks nav zināms', ru: 'время загрузки неизвестно' },
  runslog_title: { lv: 'Šodienas atjauninājumi:', ru: 'Обновления сегодня:' },
  runslog_none: { lv: 'šodien vēl nav palaišanu', ru: 'сегодня ещё не было запусков' },
  runslog_pill_sold: { lv: '−{u} gab / −{r} EUR', ru: '−{u} шт / −{r} EUR' },
  runslog_pill_flat: { lv: 'bez izmaiņām', ru: 'без изменений' },
  runslog_pill_tooltip: { lv: 'Pārdots: {u} gab ({r} EUR) · Papildināts: {a} gab · Jauni/noņemti: {n}/{rm}', ru: 'Продано: {u} шт ({r} EUR) · Пополнено: {a} шт · Новых/удалённых: {n}/{rm}' },
  integrity_ok: { lv: '✓ {n}/{u} preces pārbaudītas', ru: '✓ {n}/{u} товаров проверено' },
  integrity_warn: { lv: '⚠ Brīdinājums: {issue}', ru: '⚠ Предупреждение: {issue}' },

function t(key, vars){

  if(vars) Object.keys(vars).forEach(k => { s = s.split('{'+k+'}').join(vars[k]); });
  return s;
}

function formatRigaTime(isoStr){
  if(!isoStr) return '—';
  try {
    const d = new Date(isoStr);
    if(isNaN(d.getTime())) return '—';
    return d.toLocaleString('lv-LV', {timeZone:'Europe/Riga', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
  } catch(e){ return '—'; }
}

    const data = await res.json();

// ---- Minimal RFC4180-ish CSV parser (handles quoted fields with embedded commas/quotes) ----
function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip */ }
      else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length===1 && r[0]===''));
}

function csvToObjects(text){
  const rows = parseCsv(text);
  if(!rows.length) return [];
  const header = rows[0];
  return rows.slice(1).map(r => {
    const o = {};
    header.forEach((h,i) => { o[h] = r[i] !== undefined ? r[i] : ''; });
    return o;
  });
}

async function fetchCsv(sheetId, tabName){
  // headers=1 is required: without it, Google's gviz CSV export sometimes merges row 1 (real
  // header) with row 2 (a category banner row in Katalogs) into one garbled header line, which
  // silently breaks every column lookup below.
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}&headers=1`;
  const r = await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status} (${tabName})`);
  const text = await r.text();
  return csvToObjects(text);
}

// Raw row-array variant (no header-keyed object) — needed for sheets with two independent
// tables side by side sharing the same column names (see buildTop30FromSheet below).
async function fetchCsvRaw(sheetId, tabName){
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}&headers=1`;
  const r = await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status} (${tabName})`);
  const text = await r.text();
  return parseCsv(text);
}

// TOP30_Menesis / TOP30_30Dienas tabs hold TWO independent tables side by side on one sheet:
// sold aggregation in columns A:G, a blank gap column H, purchased aggregation in columns I:N.
// Because both blocks share column names (SKU, Nosaukums, ...), csvToObjects() cannot be used
// (duplicate header keys would collide) — parse the raw row arrays directly by column index.
function buildTop30FromSheet(rawRows){
  if(!rawRows || rawRows.length < 2) return {sold:[], purchased:[]};
  const dataRows = rawRows.slice(1);
  const sold = dataRows
    .filter(r => r[0] && r[0].charAt(0) !== '(')
    .map(r => ({
      sku: r[0]||'', name: r[1]||'', category: r[2]||'', brand: r[3]||'',
      price: parseFloat(cleanNum(r[4])||'0') || 0,
      sold_qty: parseInt(cleanNum(r[5])||'0',10) || 0,
      sum: parseFloat(cleanNum(r[6])||'0') || 0
    }));
  const purchased = dataRows
    .filter(r => r[8] && r[8].charAt(0) !== '(')
    .map(r => ({
      sku: r[8]||'', name: r[9]||'', category: r[10]||'', brand: r[11]||'',
      price: parseFloat(cleanNum(r[12])||'0') || 0,
      added_qty: parseInt(cleanNum(r[13])||'0',10) || 0
    }));
  return {sold, purchased};
}

function computeAggregates(items){
  const stocked = items.filter(r => r.stock_qty != null && r.stock_qty !== '' && r.price != null && r.price !== '');
  stocked.forEach(r => { r.stock = parseInt(r.stock_qty); r.priceNum = parseFloat(r.price); r.value = r.priceNum * r.stock; });
  const orderOnly = items.filter(r => r.stock_qty == null || r.stock_qty === '');
  const totalValue = stocked.reduce((s,r)=>s+r.value,0);
  const totalUnits = stocked.reduce((s,r)=>s+r.stock,0);

  function agg(key, roomFn){
    const d = {};
    stocked.forEach(r => {
      const k = roomFn ? roomFn(r) : (r[key] || 'Nezināms');
      if(!d[k]) d[k] = {count:0, units:0, value:0};
      d[k].count++; d[k].units += r.stock; d[k].value += r.value;
    });
    return d;
  }
  const byBrand = agg('brand');
  const byCat = agg('category');
  const byRoom = agg(null, r => {
    const parts = (r.category_full||'').split('>').map(s=>s.trim());
    return parts[2] || '(nav norādīts)';
  });

  return {stocked, orderOnly, totalValue, totalUnits, byBrand, byCat, byRoom, totalItems: items.length};
}

function topByThreshold(obj, threshold){
  const arr = Object.entries(obj).sort((a,b)=>b[1].value - a[1].value);
  const main = arr.filter(([k,v]) => v.value >= threshold);
  const tail = arr.filter(([k,v]) => v.value < threshold);
  const out = main.slice();
  if(tail.length){
    const o = {count:0, units:0, value:0};
    tail.forEach(([k,v]) => { o.count+=v.count; o.units+=v.units; o.value+=v.value; });
    out.push([(currentLang==='ru'?'Прочее':'Citi') + ` (${tail.length})`, o]);
  }
  return {main, tail, combined: out};
}

function svgTimeline(entries, totalStockUnits, svgId, width, height){
  svgId = svgId || 'timelineSvg';
  width = width || 640; height = height || 200;
  if(!entries.length) return `<div class="placeholder">${currentLang==='ru'?'Пока нет ни одной дневной записи.':'Nav vēl neviena dienas ieraksta.'}</div>`;
  const dates = entries.map(e => e.date || '');
  const revenue = entries.map(e => e.revenue || 0);
  const uniqueSku = entries.map(e => e.unique_skus_sold || 0);
  const soldUnits = entries.map(e => e.units_sold || 0);
  const added = entries.map(e => e.units_added || 0);
  const n = entries.length;
  const maxV = Math.max(...revenue, 1);
  const maxAdded = Math.max(...added, 1);
  const padL=44, padR=18, padT=34, padB=24;
  const plotW = width-padL-padR, plotH = height-padT-padB;
  const X = i => n>1 ? padL + plotW*i/(n-1) : padL + plotW*0.12;
  const Y = v => padT + plotH - (maxV ? v/maxV*plotH : 0);
  const Y2 = v => padT + plotH - (maxAdded ? v/maxAdded*plotH : 0);
  let grid = '';
  [0,0.5,1].forEach(frac => {
    const yy = padT + plotH*(1-frac);
    grid += `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${width-padR}" y2="${yy.toFixed(1)}" stroke="#2c374a" stroke-width="1"/>`;
    grid += `<text x="${padL-6}" y="${(yy+3).toFixed(1)}" font-size="10.5" fill="#b3bccf" text-anchor="end" font-family="Space Mono, monospace">€${Math.round(maxV*frac)}</text>`;
  });
  const soldPts = revenue.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const addedPts = added.map((v,i)=>`${X(i).toFixed(1)},${Y2(v).toFixed(1)}`).join(' ');
  const lastX = X(n-1);
  const growthGuide = n<=3 ? `<line x1="${lastX.toFixed(1)}" y1="${Y(revenue[n-1]).toFixed(1)}" x2="${(width-padR).toFixed(1)}" y2="${Y(revenue[n-1]).toFixed(1)}" stroke="#3a4458" stroke-width="1.5" stroke-dasharray="2,4"/>` : '';
  const dotsSold = revenue.map((v,i)=>{
    const isLast = i===n-1;
    const pulse = isLast ? `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3" fill="none" stroke="#eef1f6" stroke-width="1.2" opacity="0.6"><animate attributeName="r" values="3;8;3" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="2.2s" repeatCount="indefinite"/></circle>` : '';
    const revLbl = `<text x="${X(i).toFixed(1)}" y="${(Y(v)-19).toFixed(1)}" font-size="11" fill="#eef1f6" text-anchor="middle" font-family="Space Mono, monospace" font-weight="700">€${v.toFixed(0)}</text>`;
    const subLbl = `<text x="${X(i).toFixed(1)}" y="${(Y(v)-8).toFixed(1)}" font-size="8.5" fill="#8a93a6" text-anchor="middle" font-family="Space Mono, monospace">SKU ${uniqueSku[i]} · SUM ${soldUnits[i]}</text>`;
    return `${pulse}<circle class="tl-dot" cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.5" fill="#eef1f6" stroke="${isLast?'#dcbf78':'none'}" stroke-width="1.5"/>${revLbl}${subLbl}`;
  }).join('');
  const dotsAdded = added.map((v,i)=>{
    const lbl = v>0 ? `<text x="${X(i).toFixed(1)}" y="${(Y2(v)+15).toFixed(1)}" font-size="10" fill="#dcbf78" text-anchor="middle" font-family="Space Mono, monospace">${v}</text>` : '';
    return `<circle class="tl-dot" cx="${X(i).toFixed(1)}" cy="${Y2(v).toFixed(1)}" r="2.5" fill="#dcbf78"/>${lbl}`;
  }).join('');
  const hitCols = dates.map((d,i) => {
    const cx = X(i);
    const colW = n>1 ? Math.max(plotW/(n-1), 12) : Math.max(plotW*0.3, 40);
    return `<rect class="tl-hit" data-i="${i}" x="${(cx-colW/2).toFixed(1)}" y="${padT}" width="${colW.toFixed(1)}" height="${plotH}" fill="transparent"/>`;
  }).join('');
  const step = Math.max(1, Math.floor(n/12));
  let labels = '';
  dates.forEach((d,i) => { if(i%step===0 || i===n-1) labels += `<text x="${X(i).toFixed(1)}" y="${height-6}" font-size="10" fill="#b3bccf" text-anchor="middle" font-family="Space Mono, monospace">${esc(d.slice(5))}</text>`; });
  const titleNote = n>1 ? '' : `<text x="${padL}" y="14" font-size="10" fill="#b3bccf" text-anchor="start" font-family="DM Sans">${currentLang==='ru'?'1-я точка дня — линия сформируется со 2-го дня':'1. dienas punkts — līnija veidosies no 2. dienas'}</text>`;
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:${height}px;display:block" id="${svgId}">
    ${grid}
    ${growthGuide}
    <polyline points="${soldPts}" fill="none" stroke="#eef1f6" stroke-width="2.5"/>
    <polyline points="${addedPts}" fill="none" stroke="#dcbf78" stroke-width="1.5" stroke-dasharray="4,3"/>
    ${dotsAdded}${dotsSold}
    ${hitCols}
    ${labels}
    ${titleNote}
  </svg>`;
}

function monthlyAgg(entries){
  const m = {};
  (entries||[]).forEach(e=>{
    if(!e || !e.date) return;
    const ym = e.date.slice(0,7);
    if(!m[ym]) m[ym] = {revenue:0, units_sold:0, units_added:0, days:0};
    m[ym].revenue += e.revenue||0;

    m[ym].units_added += e.units_added||0;
    m[ym].days++;
  });
  return m;
}

function compareToPrevMonth(entries, metricFn){
  const now = new Date();
  const curYm = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const prevD = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prevYm = `${prevD.getFullYear()}-${String(prevD.getMonth()+1).padStart(2,'0')}`;
  const curEntries = (entries||[]).filter(e=>e && e.date && e.date.startsWith(curYm));
  const prevEntries = (entries||[]).filter(e=>e && e.date && e.date.startsWith(prevYm));
  const curVal = curEntries.reduce((s,e)=>s+metricFn(e),0);
  const prevVal = prevEntries.reduce((s,e)=>s+metricFn(e),0);
  const hasPrev = prevEntries.length>0;
  const pct = (hasPrev && prevVal>0) ? ((curVal-prevVal)/prevVal*100) : null;
  return {curVal, prevVal, hasPrev, pct, curEntries, curYm};
}

function compareDayOverDay(entries, metricFn){
  const n = entries.length;
  const curVal = n>=1 ? metricFn(entries[n-1]) : 0;
  const hasPrev = n>=2;
  const prevVal = hasPrev ? metricFn(entries[n-2]) : 0;
  const pct = hasPrev ? (prevVal>0 ? ((curVal-prevVal)/prevVal*100) : (curVal>0 ? null : 0)) : null;
  return {curVal, prevVal, hasPrev, pct};
}

function compareRolling30(entries, metricFn){
  const n = entries.length;
  const cur30 = entries.slice(Math.max(0,n-30), n);
  const prev30 = entries.slice(Math.max(0,n-60), Math.max(0,n-30));
  const curVal = cur30.reduce((s,e)=>s+metricFn(e),0);
  const prevVal = prev30.reduce((s,e)=>s+metricFn(e),0);
  const hasPrev = prev30.length>0;
  const pct = (hasPrev && prevVal>0) ? ((curVal-prevVal)/prevVal*100) : (hasPrev && curVal>0 ? null : (hasPrev ? 0 : null));
  return {curVal, prevVal, hasPrev, pct};
}

function periodBadge(cmp, noDataMsg){

  const up = cmp.pct>=0;
  return `<span class="mom-badge ${up?'mom-up':'mom-dn'}">${up?'▲':'▼'} ${Math.abs(cmp.pct).toFixed(1)}%</span>`;
}

function computeMovement(historyRecords){
  const entries = (historyRecords||[]).filter(h => h && h.date);
  const isRolling30 = entries.length >= 30;
  const windowEntries = isRolling30 ? entries.slice(-30) : entries;
  const sum = (key) => windowEntries.reduce((s,h)=>s+(h[key]||0),0);
  const catAgg = {}, brandAgg = {};
  windowEntries.forEach(h => {
    try { const cj = h.by_category_json ? JSON.parse(h.by_category_json) : {}; Object.entries(cj).forEach(([k,v])=>{ catAgg[k]=(catAgg[k]||0)+v; }); } catch(e){}
    try { const bj = h.by_brand_json ? JSON.parse(h.by_brand_json) : {}; Object.entries(bj).forEach(([k,v])=>{ brandAgg[k]=(brandAgg[k]||0)+v; }); } catch(e){}
  });
  return {
    entries, windowEntries, isRolling30,
    unitsSold: sum('units_sold'), revenueSold: sum('revenue'), unitsAdded: sum('units_added'),
    newItems: sum('new_items'), removedItems: sum('removed_items'),
    catAgg, brandAgg,
    latest: entries.length ? entries[entries.length-1] : null
  };
}

async function loadAll(){
  updateLangButtons();
  applyStaticText();
  lastState = null;
  lastError = null;
  document.getElementById('loadingText').textContent = t('loading');
  document.getElementById('statusBadge').innerHTML = `<i></i>${t('status_loading')}`;
  document.getElementById('updateBarText').textContent = t('updatebar_loading');
  document.getElementById('app').innerHTML = `<div class="loading">${t('loading')}</div>`;
  try {
    const [katalogsRows, dienasRows, oldStockRows, pardotasRows, papildinatasRows, top30MenesisRaw, top3030DienasRaw] = await Promise.all([
      fetchCsv(CATALOG_SHEET_ID, 'Katalogs'),
      fetchCsv(ANALYTICS_SHEET_ID, 'Dienas_Grafiks'),
      fetchCsv(ANALYTICS_SHEET_ID, 'Old_Stock'),
      fetchCsv(ANALYTICS_SHEET_ID, 'Sodien_Pardotas'),
      fetchCsv(ANALYTICS_SHEET_ID, 'Sodien_Papildinatas'),
      fetchCsvRaw(ANALYTICS_SHEET_ID, 'TOP30_Menesis'),
      fetchCsvRaw(ANALYTICS_SHEET_ID, 'TOP30_30Dienas'),
      checkStatus()
    ]);

    const items = buildItemsFromKatalogs(katalogsRows);
    const agg = computeAggregates(items);
    const historyRecords = buildHistoryFromDienasGrafiks(dienasRows);
    const trackerRecords = buildTrackerFromOldStock(oldStockRows);
    const soldResult = buildSoldFromSheet(pardotasRows);
    const purchasedResult = buildPurchasedFromSheet(papildinatasRows);
    const top30Month = buildTop30FromSheet(top30MenesisRaw);
    const top3030Days = buildTop30FromSheet(top3030DienasRaw);
    const oosActive = [], oosResolved = [];

    renderDashboard(agg, historyRecords, trackerRecords, null, oosActive, oosResolved, soldResult.items, purchasedResult.items, soldResult.date, purchasedResult.date, top30Month, top3030Days);

    const now = new Date();
    document.getElementById('statusBadge').innerHTML = `<i></i>${t('status_live',{time:now.toLocaleString('lv-LV')})}`;
    document.getElementById('footTime').textContent = t('foot_time',{time:now.toLocaleString('lv-LV')});

    const latestHist = historyRecords.filter(h=>h&&h.date).slice(-1)[0];
    const sourceTag = (lastUpdateSource && lastUpdateSource.type === 'manual')
      ? ' ' + t('source_manual',{used:lastUpdateSource.used, limit:lastUpdateSource.limit})
      : '';
    document.getElementById('updateBarText').textContent = t('updatebar_live',{date:esc(latestHist?latestHist.date:'—')});
    document.getElementById('updateBarSub').innerHTML = `${t('updatebar_sub')}${sourceTag}`;
    renderLastLoadInfo();
    renderManualLog();
    renderRunsLog();
    renderRefreshChanges(lastRefreshChangeData);
  } catch(err){
    showError(err.message || String(err));
  }
}

async function fullRefresh(){
  if(refreshInProgress) return;
  refreshInProgress = true;
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = t('refresh_running');
  document.getElementById('statusBadge').innerHTML = `<i></i>${t('refresh_running')}`;
  try {
    const res = await fetch(MANUAL_REFRESH_WEBHOOK + '?tok=' + encodeURIComponent(MANUAL_REFRESH_TOKEN));
    let data = null;
    try { data = await res.json(); } catch(e){ data = null; }
    if(data && Array.isArray(data.manualTimes)) manualTimesLog = data.manualTimes;
    if(data && data.status === 'limit_reached'){
      alert(t('refresh_limit',{used:data.manualUsedToday, limit:data.manualLimit}));
    } else if(!res.ok || !data || data.status !== 'ok'){
      alert(t('refresh_error',{msg:(data && data.message) || ('HTTP ' + res.status)}));
    } else {
      lastUpdateSource = {type:'manual', used:data.manualUsedToday, limit:data.manualLimit};
      if(data.lastRunAt) lastKnownRunInfo = {lastRunAt: data.lastRunAt, runsToday: data.runsToday};
      lastRefreshChangeData = data;
    }
  } catch(err){
    alert(t('refresh_error',{msg: err.message || String(err)}));
  } finally {
    refreshInProgress = false;
    btn.disabled = false;
    btn.innerHTML = t('refresh_btn');
    await loadAll();
  }
}

function goToNextSection(){
  const sects = Array.from(document.querySelectorAll('.sect'));
  if(!sects.length) return;
  const vh = window.innerHeight;
  let target = sects.find(s => s.getBoundingClientRect().top > vh*0.15);
  if(!target) target = sects[0];
  target.scrollIntoView({behavior:'smooth', block:'start'});
}
